<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todoアプリ</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Todoアプリ</h1>

        <form id="todo-form" class="todo-form">
            <input
                type="text"
                id="todo-input"
                class="todo-input"
                placeholder="やることを入力..."
                autocomplete="off"
                required
            >
            <button type="submit" class="add-btn">追加</button>
        </form>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">すべて</button>
            <button class="filter-btn" data-filter="active">未完了</button>
            <button class="filter-btn" data-filter="completed">完了</button>
        </div>

        <ul id="todo-list" class="todo-list"></ul>

        <div class="footer">
            <span id="todo-count" class="todo-count">残り: 0件</span>
            <button id="clear-completed" class="clear-btn">完了したものを削除</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
